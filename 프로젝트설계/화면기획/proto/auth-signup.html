<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1.2 회원가입 — money-log</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/ui.css">
</head>
<body>
<div class="layout-auth">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">money-log</div>
      <p>회원가입</p>
    </div>
    <form onsubmit="return false;">
      <div class="form-group"><label for="loginId">아이디</label><input class="input" id="loginId" name="loginId" value="leeyj" required></div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input class="input" id="password" type="password" name="password" value="TempPass1!" required>
        <p class="form-hint">8자 이상, 영·대·소·특수·숫자 중 3종류 이상</p>
      </div>
      <div class="form-group"><label for="passwordConfirm">비밀번호 확인</label><input class="input" id="passwordConfirm" type="password" name="passwordConfirm" value="TempPass1!" required></div>
      <div class="form-group"><label for="nickname">닉네임</label><input class="input" id="nickname" name="nickname" value="이윤주" required></div>
      <div class="form-group"><label for="email">이메일 (선택)</label><input class="input" id="email" type="email" name="email" value="leeyj@example.com"></div>
      <div class="form-group"><label for="phone">폰 (선택, 숫자만)</label><input class="input" id="phone" name="phone" inputmode="numeric" value="01098765432"></div>
      <button class="btn btn-primary btn-block" type="submit">가입</button>
    </form>
    <div class="auth-links"><a href="auth-login.html">로그인으로</a></div>
  </div>
</div>
</body>
</html>
