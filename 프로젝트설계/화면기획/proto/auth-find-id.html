<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1.3 아이디 찾기 — money-log</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/ui.css">
</head>
<body>
<div class="layout-auth">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">money-log</div>
      <p>아이디 찾기</p>
    </div>
    <form action="#" method="post" onsubmit="return false;">
      <div class="form-group">
        <label for="email">가입 이메일</label>
        <input class="input" id="email" name="email" type="email" value="hong@example.com" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">아이디 찾기</button>
    </form>
    <div class="alert alert-info" style="margin-top:var(--space-4)">
      찾은 아이디: <strong>hong</strong>
      <p class="form-hint" style="margin:8px 0 0">예시 결과입니다. 실제로는 서버에서 조회합니다.</p>
    </div>
    <div class="auth-links">
      <a href="auth-login.html">로그인으로</a>
      <a href="auth-find-password.html">비밀번호 찾기</a>
    </div>
  </div>
</div>
</body>
</html>
