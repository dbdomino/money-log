<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1.4 비밀번호 찾기 — money-log</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/ui.css">
</head>
<body>
<div class="layout-auth">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">money-log</div>
      <p>비밀번호 찾기</p>
    </div>
    <p class="form-hint form-hint--block">아이디와 닉네임으로 본인을 확인한 뒤, 비밀번호를 바꿉니다.</p>
    <form action="#" method="post" onsubmit="return false;">
      <div class="form-group">
        <label for="loginId">아이디</label>
        <input class="input" id="loginId" name="loginId" value="hong" required>
      </div>
      <div class="form-group">
        <label for="nickname">닉네임</label>
        <input class="input" id="nickname" name="nickname" value="홍길동" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">확인</button>
    </form>
    <p class="form-hint" style="margin-top:var(--space-4)">확인되면 <a href="auth-reset-password.html">비밀번호 변경</a> 화면으로 이동합니다.</p>
    <div class="auth-links">
      <a href="auth-login.html">로그인으로</a>
      <a href="auth-find-id.html">아이디 찾기</a>
    </div>
  </div>
</div>
</body>
</html>
