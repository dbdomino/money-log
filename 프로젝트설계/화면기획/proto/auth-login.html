<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1.1 로그인 — money-log</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/ui.css">
</head>
<body>
<div class="layout-auth">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">money-log</div>
      <p>가계부를 심플하게</p>
    </div>
    <form action="#" method="post" onsubmit="return false;">
      <div class="form-group">
        <label for="loginId">아이디</label>
        <input class="input" id="loginId" name="loginId" type="text" autocomplete="username" value="hong" required>
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" value="DemoPass1!" required>
      </div>
      <p class="form-hint form-hint--block">검수용 예시: hong / DemoPass1! (실제 API 호출 없음)</p>
      <button class="btn btn-primary btn-block" type="submit">로그인</button>
    </form>
    <div class="auth-links">
      <a href="auth-signup.html">회원가입</a>
      <a href="#">아이디 찾기</a>
      <a href="#">비밀번호 찾기</a>
    </div>
  </div>
</div>
</body>
</html>
