<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1.5 비밀번호 변경 — money-log</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/ui.css">
</head>
<body>
<div class="layout-auth">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="logo">money-log</div>
      <p>비밀번호 변경</p>
    </div>
    <p class="form-hint form-hint--block">아이디 <strong>hong</strong> · 비밀번호 찾기 확인 후 단계</p>
    <form action="#" method="post" onsubmit="return false;">
      <div class="form-group">
        <label for="newPassword">새 비밀번호</label>
        <input class="input" id="newPassword" name="newPassword" type="password" value="NewPass1!" required>
        <p class="form-hint">8자 이상, 영·대·소·특수·숫자 중 3종류 이상</p>
      </div>
      <div class="form-group">
        <label for="newPasswordConfirm">새 비밀번호 확인</label>
        <input class="input" id="newPasswordConfirm" name="newPasswordConfirm" type="password" value="NewPass1!" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">변경</button>
    </form>
    <div class="auth-links">
      <a href="auth-login.html">로그인으로</a>
    </div>
  </div>
</div>
</body>
</html>
